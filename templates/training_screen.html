{% extends "base.html" %}
{% block title %}Predictive Maintenance {% endblock %}

{% block content %}
<div class="container-fluid">
    <h1 class="mt-4"></h1>

    <div class="card mb-4">
        <div class="card-body">
            <h5 class="card-title">Sensor Data Input</h5>

            <form method="post" id="sensorDataForm">
                {% csrf_token %}
                <div class="row align-items-end">
                    <div class="col-md-3">
                        <label for="sensorName" class="form-label">Sensor Name</label>
                        <select id="sensorName" name="sensor_name" class="form-control" required>
                            <option value="">Select a Sensor</option>
                            {% for sensor in sensors %}
                            <option value="{{ sensor.element_id }}">{{ sensor.element_name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label for="startDatetime" class="form-label">Start Datetime</label>
                        <input type="datetime-local" class="form-control" id="startDatetime" name="start_datetime" required>
                    </div>
                    <div class="col-md-3">
                        <label for="endDatetime" class="form-label">End Datetime</label>
                        <input type="datetime-local" class="form-control" id="endDatetime" name="end_datetime" required>
                    </div>
                    <div class="col-md-3 text-end">
                        <button type="submit" class="btn btn-primary w-117" id="getDataButton">Get Data</button>

                        <button  style="display: none;" type="button" class="btn btn-info" id="showPopupButton">Training Screen</button>
                    </div>
                </div>
            </form>
<!-- Modal HTML Structure -->
<div class="modal fade" id="myModal" tabindex="-1" aria-labelledby="myModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="myModalLabel">Start Training</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <!-- Input fields for No of Epochs and No_of_steps -->
        <div class="mb-3">
          <label for="No_of_Epochs" class="form-label">No of Epochs</label>
          <input type="text" class="form-control" id="No_of_Epochs" placeholder="No of Epochs - 150">
        </div>
        <div class="mb-3">
          <label for="No_of_steps" class="form-label">No of steps</label>
          <input type="text" class="form-control" id="No_of_steps" placeholder="No of steps - 200">
        </div>
           <div class="mb-3">
          <label for="anomaly_percentage" class="form-label">Anomaly percentage on data</label>
          <input type="text" class="form-control" id="anomaly_percentage" placeholder="Anomaly percentage on data - 10">
        </div>

        <!-- Loading Spinner (Initially hidden) -->
        <div id="loadingSpinner" class="text-center" style="display: none;">
            <div class="bounce">
              <div class="bounce-ball"></div>
              <div class="bounce-ball"></div>
              <div class="bounce-ball"></div>
            </div>
            <p>Processing... Please wait.</p>
          </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        <button type="button" class="btn btn-primary" id="submitNumbers">Submit</button>
      </div>
    </div>
  </div>
</div>
           <div class="chart-container" id="chartContainer" style="display: none;">
             <canvas id="chart" width="800" height="600"></canvas>
           </div>

        </div>
    </div>

</div>

{% endblock %}{% block javascript %}

<script>
    $(document).ready(function () {
        $('#getDataButton').on('click', function (event) {
            event.preventDefault(); // Prevent default form submission

            // Collect form data
            var startDatetime = $('#startDatetime').val();
            var endDatetime = $('#endDatetime').val();
            var sensorName = $('#sensorName').val();

            // Show loading spinner or disable the button
            $('#responseMessage').html('<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Loading...');
            $('#getDataButton').prop('disabled', true);

            // Validate inputs (optional)
            if (!sensorName || !startDatetime || !endDatetime) {
                $('#responseMessage').html('Please fill out all fields.');
                $('#getDataButton').prop('disabled', false);
                return;
            }

            // AJAX request
            $.ajax({
                url: '/predictive/hourly_data/',  // URL of the Django view
                type: 'POST',
                data: {
                    sensor_name: sensorName,
                    start_datetime: startDatetime,
                    end_datetime: endDatetime,
                    csrfmiddlewaretoken: $('input[name="csrfmiddlewaretoken"]').val() // CSRF token for security
                },
                success: function (response) {
                    // Enable the button
                    $('#getDataButton').prop('disabled', false);

                    if (response.success) {

                        // Show chart container and render chart
                        $('#chartContainer').show();
                        $('#showPopupButton').show();

                        var ctx = document.getElementById('chart').getContext('2d');

                        const year = response.data.chartData.map(item => item.year);
                        const value = response.data.chartData.map(item => parseFloat(item.value));

                        var chart = new Chart(ctx, {
                            type: 'line',
                            data: {
                                labels:year,
                                datasets: [{
                                    label: "Training Data..",
                                    data: value,
                                    borderColor: 'rgba(75, 192, 192, 1)',
                                    fill: false
                                }]
                            },
                            options: {
                                responsive: true,
                                maintainAspectRatio: false
                            }
                        });

                    } else {
                        // Handle case when no data is found
                        $('#responseMessage').html('<span class="text-warning">No data found for the selected range.</span>');
                        $('#chartContainer').hide(); // Hide chart if no data
                    }
                },
                error: function (xhr, status, error) {
                    // Enable the button
                    $('#getDataButton').prop('disabled', false);

                    // Show error message
                    $('#responseMessage').html('<span class="text-danger">An error occurred while fetching data. Please try again.</span>');
                    console.error('Error:', error);
                    $('#chartContainer').hide(); // Hide chart on error
                }
            });
        });



        // Show the modal when the "Show Pop-Up" button is clicked
        $('#showPopupButton').on('click', function () {
            $('#myModal').modal('show');
        });

        // Handle form submission inside the modal (Submit Numbers)
        $('#submitNumbers').on('click', function () {
            // Get values of No_of_Epochs, No_of_steps, and anomaly_percentage from the input fields
            var sensor_name = $('#sensorName').val();
            var start_datetime = $('#startDatetime').val();
            var end_datetime = $('#endDatetime').val();
            var No_of_Epochs = parseFloat($('#No_of_Epochs').val());
            var No_of_steps = parseFloat($('#No_of_steps').val());
            var anomaly_percentage = parseFloat($('#anomaly_percentage').val());

            // Validate if all fields are filled and contain valid numbers
            if (isNaN(No_of_Epochs) || isNaN(No_of_steps) || isNaN(anomaly_percentage)) {
                Swal.fire({
                    icon: 'error',
                    title: 'Invalid Input',
                    text: 'Please enter valid numbers for all fields (No of Epochs, No of steps, Anomaly percentage).'
                });
                return;
            }

            // Show the loading spinner and disable the submit button
            $('#loadingSpinner').show(); // Show the spinner
            $('#submitNumbers').prop('disabled', true); // Disable the button to prevent multiple submissions

            // Prepare data for AJAX
            var data = {
                start_datetime:start_datetime,
                end_datetime:end_datetime,
                sensor_name:sensor_name,
                No_of_Epochs: No_of_Epochs,
                No_of_steps: No_of_steps,
                anomaly_percentage: anomaly_percentage,

                csrfmiddlewaretoken: $('input[name="csrfmiddlewaretoken"]').val() // CSRF token for security
            };

            // AJAX request to send data to the Django view
            $.ajax({
                url: '{% url "train_model" %}',   // Ensure this URL points to the correct Django view
                type: 'POST',
                data: data,
                success: function (response) {
                    // Hide the loading spinner after successful submission
                    $('#loadingSpinner').hide();
                    $('#submitNumbers').prop('disabled', false); // Re-enable the button

                    // Hide modal after successful submission
                    $('#myModal').modal('hide');

                    // Show SweetAlert success message
                    if (response.success) {
                        Swal.fire({
                            icon: 'success',
                            title: 'Success!',
                            text: ' Message: ' + response.message,
                            showCancelButton: true,
                            confirmButtonText: 'Go to Dashboard',  // Button text for redirect
                            cancelButtonText: 'Stay Here',  // Button text for staying on the current page
                            preConfirm: () => {
                                // This will trigger a page redirect when the user clicks the "Go to Dashboard" button
                                window.location.href = '/predictive/predictive_screen/';  // Replace with the desired URL
                            }
                        });
                    } else {
                        Swal.fire({
                            icon: 'error',
                            title: 'Error',
                            text: 'Exception: ' + response.message
                        });
                    }
                },
                error: function (xhr, status, error) {
                    // Hide the loading spinner if an error occurs
                    $('#loadingSpinner').hide();
                    $('#submitNumbers').prop('disabled', false); // Re-enable the button

                    Swal.fire({
                        icon: 'error',
                        title: 'An error occurred',
                        text: 'An error occurred while processing the request. Please try again.'
                    });
                    console.error('Error:', error);
                }
            });
        });
    });
</script>


{% endblock %}
