<!-- templates/login.html -->

{% extends 'base.html' %}
{% load static %}

{% block title %}Login{% endblock %}

{% block content %}
<body style="background-image:url('{% static 'images/image.jpg' %}');">
<div class="row mx-auto justify-content-center" style="padding-top:180px">
    <div class="col-md-3">
        <div class="card shadow-lg p-5" style="background-color:rgba(255,255,255,0.8")>
            <h3 class="text-center mb-4">Login</h3>
            <form method="POST" action="training_screen/">
            <form method="POST" action="training_screen/">
                {% csrf_token %} <!-- Only for Django. Remove if using Flask. -->
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" name="username" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary" style="background-color:#2C3E50">Login</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
{% endblock %}
